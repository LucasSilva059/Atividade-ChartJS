<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>CHARTJS</title>

</head>
<body style="display: flex;">
   <div>
      <canvas id="graficoDeLinhas" style="position: relative; height: 40vh; width: 40vw;"></canvas>
   </div>
   <div>
      <canvas id="graficoDeBarras" style="position: relative; height: 40vh; width: 40vw; color: (rgb(72, 102, 238));"></canvas>
   </div>

   <script src="https://cdn.jsdelivr.net/npm/chart.js" ></script>

   <script>
      const ctx = document.getElementById('graficoDeLinhas');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['12:00', '13:00', '14:00', '15:00', '16:00', '17:00'], // nome das barras

      datasets: [{ // dados das barras
        label: 'Umidade',
        data: [30, 29, 28, 25, 22, 23],
        borderColor: 'rgb(238, 72, 72)',
        backgroundColor: 'rgb(238, 72, 72)',
        borderWidth: 1
      }, 
      {  label: 'Temperatura',
         data: [80, 82, 80, 85, 80, 83],
         borderColor: 'rgb(72, 102, 238)',
         backgroundColor: 'rgb(72, 102, 238)',
         borderWidth: 1
      }]

    },
    options: {
      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });
  
   </script>

   <script>
       const ctx2 = document.getElementById('graficoDeBarras');

  new Chart(ctx2, {
    type: 'bar',
    data: {
      labels: ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho'], // nome das barras

      datasets: [{ // dados das barras
        label: 'Umidade Média',
        data: [22, 24, 27, 23, 20, 18],
        backgroundColor: 'rgb(238, 72, 72)',
        borderWidth: 1
      }, 
      {  label: 'Temperatura Média',
         data: [90, 89, 93, 87, 88, 82],
         backgroundColor: 'rgb(72, 102, 238)',
         borderWidth: 1
      }]

    },
    options: {
      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });

</script>
</body>
</html>
